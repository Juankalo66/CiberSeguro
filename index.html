<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CiberSeguro Colombia</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #0b1326; color: white; }
        input, button { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #4f46e5; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #6366f1; }
        .resultado { margin-top: 20px; padding: 15px; border-radius: 8px; white-space: pre-line; }
        .filtrada { background: #7f1a1a; border-left: 5px solid #ef4444; }
        .segura { background: #14532d; border-left: 5px solid #22c55e; }
        .error { background: #1e1e2f; border-left: 5px solid #f59e0b; }
        h1 { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <h1>🛡️ CiberSeguro Colombia</h1>
    <p>Verifica si tu contraseña ha sido filtrada en brechas de datos. Utiliza el modelo <strong>k-Anonymity</strong> de Have I Been Pwned.</p>
    
    <label>🔐 Contraseña a verificar:</label>
    <input type="password" id="password" placeholder="Escribe tu contraseña aquí...">
    
    <button id="verificarBtn">Verificar contraseña</button>
    
    <div id="resultado" class="resultado" style="display: none;"></div>

    <p style="font-size: 12px; margin-top: 30px; color: #888;">
        ⚠️ Tu contraseña nunca sale de tu dispositivo. Solo se envían los primeros 5 caracteres del hash SHA-1.
    </p>

    <script>
        // ⚠️ link de Render
        const API_URL = "https://ciber-seguro-api.onrender.com/api/v1/check/password";
        
        document.getElementById("verificarBtn").onclick = async () => {
            const password = document.getElementById("password").value;
            const resultadoDiv = document.getElementById("resultado");
            
            if (!password) {
                alert("✏️ Escribe una contraseña para verificar");
                return;
            }
            
            resultadoDiv.style.display = "block";
            resultadoDiv.innerHTML = "🔍 Verificando... Esto puede tomar unos segundos.";
            resultadoDiv.className = "resultado";
            
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if (data.compromised) {
                    resultadoDiv.innerHTML = `
                        ❌ ¡ALERTA DE SEGURIDAD!\n\n
                        Esta contraseña ha sido encontrada en ${data.times_exposed.toLocaleString()} filtraciones de datos.\n\n
                        ⚠️ Cámbiala INMEDIATAMENTE. No la uses en ningún servicio.\n
                        ✅ Usa un administrador de contraseñas y activa verificación en dos pasos.
                    `;
                    resultadoDiv.className = "resultado filtrada";
                } else {
                    resultadoDiv.innerHTML = `
                        ✅ ¡CONTRASEÑA SEGURA!\n\n
                        No se encontró esta contraseña en ninguna filtración conocida.\n\n
                        👍 Mantén buenas prácticas: no la reutilices y actívate 2FA cuando sea posible.
                    `;
                    resultadoDiv.className = "resultado segura";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "❌ Error de conexión con el servicio de verificación.\n\nAsegúrate de que el backend esté desplegado en Render y que la URL sea correcta.";
                resultadoDiv.className = "resultado error";
            }
        };
    </script>
</body>
</html>
